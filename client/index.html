<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Room - Debug com Cafe</title>

    <!--
      Correcao: caminho atualizado para refletir a estrutura real do projeto
      O style.css fica na raiz de client/, nao em css/
    -->
    <link rel="stylesheet" href="./style.css" />

    <!--
      Phaser carregado via CDN pois e uma dependencia de runtime grande.
      O socket.io-client foi removido daqui: e importado via npm no main.js,
      permitindo que o Vite o inclua corretamente no bundle.
    -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  </head>
  <body>
    <div id="app">
      <div id="menu-trigger"><button id="btn-menu" tabindex="-1">&#8942;</button></div>
      <div id="menu-dropdown">
        <div class="menu-item" id="btn-mute"><span id="icon-mute">MIC</span> <span id="text-mute">Mutar Mic</span> <span class="shortcut-hint">M</span></div>
        <div class="menu-item" id="btn-deafen"><span id="icon-deafen">FONE</span> <span id="text-deafen">Desativar Audio</span></div>
        <div class="menu-item" id="btn-screen"><span id="icon-screen">TELA</span> <span id="text-screen">Compartilhar Tela</span></div>
        <div class="menu-item danger" id="btn-logout"><span>SAIR</span> Sair</div>
      </div>

      <div id="sidebar">
        <div id="sidebar-header">
          <h3>VIRTUAL ROOM</h3>
          <h2>&lt;debug com cafe /&gt;</h2>
        </div>
        <ul id="user-list"></ul>
      </div>

      <div id="tela-login">
        <div class="login-wrapper">
          <div class="login-left">
            <h1>VIRTUAL ROOM</h1>
            <h2>&lt;debug com cafe /&gt;</h2>
            <input type="text" id="input-nome" class="login-field" placeholder="Usuario" maxlength="18">
            <input type="password" id="input-senha" class="login-field" placeholder="Senha (Min 6)" maxlength="20">
            <div id="status-msg"></div>
            <button class="btn-primary" id="btn-entrar">ENTRAR</button>
            <button class="btn-secondary" id="btn-reconnect">Reconectar</button>
          </div>
          <div class="login-right">
            <label style="color:#aaa;display:block;text-align:center;margin-bottom:10px;font-size:13px;">Escolha seu Avatar</label>
            <div class="char-grid" id="char-grid"></div>
          </div>
        </div>
      </div>

      <div id="chat-container" style="display: none;">
        <div id="chat-messages"></div>
        <div id="emoji-picker"></div>
        <div class="chat-input-wrapper">
          <input type="text" id="chat-input" placeholder="Tecle ENTER para falar..." autocomplete="off">
          <button id="btn-emoji" tabindex="-1">EMOJI</button>
        </div>
      </div>

      <div id="video-modal">
        <div id="video-header"><button class="btn-close-video" onclick="fecharVideo()">FECHAR X</button></div>
        <div id="video-container"></div>
      </div>
    </div>

    <div id="audio-remoto-container" style="display:none;"></div>

    <!--
      Correcao: caminho atualizado de js/main.js para ./src/main.js,
      refletindo a estrutura real do projeto (client/src/main.js).
      O atributo type="module" e obrigatorio para o Vite processar o arquivo.
    -->
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
